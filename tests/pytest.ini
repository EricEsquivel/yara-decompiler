[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts = -v --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    semantic: marks semantic equivalence tests
    golden: marks golden file comparison tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
